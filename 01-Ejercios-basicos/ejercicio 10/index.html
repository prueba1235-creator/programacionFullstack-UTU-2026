<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <h1 id="miTitulo">Texto Original</h1>
    <button id="miBoton">Cambiar Texto</button>

    <hr>


    <p id="miParrafo">Este es un párrafo normal.</p>
    <button id="btnHtml">Cambiar con HTML</button>

    <hr>


    <br>
    <img id="miImagen" src="https://picsum.photos" alt="Perrito">
    <br>
    <button id="btnImagen">Cambiar Imagen</button>

    <hr>

    <input type="text" id="miInput" placeholder="Escribe algo aquí...">
    <button id="btnInput">Mostrar Mensaje</button>
    <p id="resultadoInput"></p>

    <hr>


    <div id="miCaja" class="caja">Soy una caja de texto</div>
    <button id="btnAgregarClase">Agregar Clase (Rojo)</button>
    <button id="btnQuitarClase">Quitar Clase (Rojo)</button>
    <button id="btnModoOscuro">Modo Oscuro (Toggle)</button>

    <hr>

    <button id="btnAgregarLista">Agregar a la Lista</button>
    <ul id="miLista">
        <li>Elemento inicial</li>
    </ul>

    <hr>

    <hr>
    <form id="miFormulario">
        <input type="text" id="nombre" placeholder="Nombre" required><br>
        <input type="text" id="color" placeholder="Color favorito (ej: red o #ff0000)" required><br>
        <input type="text" id="mensaje" placeholder="Mensaje" required><br>
        <button type="submit">Enviar</button>
    </form>

    <!-- Contenedor donde se agregarán las tarjetas nuevas -->
    <div id="contenedorTarjetas"></div>



    <script src="script.js"></script>
</body>

</html>
